<div class="solution-editor-container">
  @if (isLoading()) {
    <div class="loading-overlay">
      <div class="spinner"></div>
      <p>Loading...</p>
    </div>
  } @else {
    <header class="editor-header panel">
      <div class="header-left">
        <button type="button" class="btn btn--secondary btn--icon" (click)="goBack()" title="Cancel and go back">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </button>
        <div class="title-input-wrapper">
          <input 
            type="text" 
            class="title-input" 
            placeholder="Enter your title" 
            [formControl]="solutionForm.controls.title"
            [class.invalid]="solutionForm.controls.title.invalid && solutionForm.controls.title.touched"
          />
        </div>
      </div>
      <div class="header-right">
        <button type="button" class="btn btn--secondary" (click)="goBack()">Cancel</button>
        <button 
          type="button" 
          class="btn btn--primary" 
          [disabled]="isSubmitting()"
          (click)="publishSolution()">
          {{ isSubmitting() ? 'Publishing...' : (isEditMode() ? 'Update' : 'Post') }}
        </button>
      </div>
    </header>

    <div class="editor-main">
      <as-split direction="horizontal" [useTransition]="true">
        <as-split-area [size]="50">
          <div class="pane-header">
            <h3>Markdown Content</h3>
          </div>
          <div class="monaco-wrapper">
            <ngx-monaco-editor 
              [options]="editorOptions" 
              [formControl]="solutionForm.controls.content">
            </ngx-monaco-editor>
          </div>
        </as-split-area>
        
        <as-split-area [size]="50">
          <div class="pane-header">
            <h3>Preview</h3>
          </div>
          <div class="preview-wrapper markdown-body" [innerHTML]="previewContent() | mdRender"></div>
        </as-split-area>
      </as-split>
    </div>
  }
</div>
