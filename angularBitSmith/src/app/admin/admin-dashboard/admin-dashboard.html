<div class="container" style="min-height: calc(100vh - 120px);">
  <div class="panel" style="max-width: 800px; margin: 2rem auto; text-align: center;">
    <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-strong);">Admin Dashboard</h1>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">Manage problems, daily challenges, and content.</p>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem;">
      <!-- Set PoD -->
      <a routerLink="/admin/pod" class="dashboard-card" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; border-radius: 12px; background: var(--bg-surface); border: 1px solid var(--border-color); text-decoration: none; color: inherit; transition: all 0.2s;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#00b8a3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="48" height="48" style="margin-bottom: 1rem;">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <h3 style="margin: 0 0 0.5rem 0; font-size: 1.1rem; color: var(--text-strong);">Problem of the Day</h3>
        <p style="margin: 0; font-size: 0.85rem; color: var(--text-muted);">Select or change the daily problem</p>
      </a>

      <!-- Add Problem -->
      <a routerLink="/admin/problem" class="dashboard-card" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; border-radius: 12px; background: var(--bg-surface); border: 1px solid var(--border-color); text-decoration: none; color: inherit; transition: all 0.2s;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#00b8a3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="48" height="48" style="margin-bottom: 1rem;">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="12" y1="18" x2="12" y2="12"></line>
          <line x1="9" y1="15" x2="15" y2="15"></line>
        </svg>
        <h3 style="margin: 0 0 0.5rem 0; font-size: 1.1rem; color: var(--text-strong);">Add Problem</h3>
        <p style="margin: 0; font-size: 0.85rem; color: var(--text-muted);">Create a new coding challenge</p>
      </a>

      <!-- Edit Problem -->
      <a routerLink="/admin/problem/edit" class="dashboard-card" style="display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; border-radius: 12px; background: var(--bg-surface); border: 1px solid var(--border-color); text-decoration: none; color: inherit; transition: all 0.2s;">
        <svg viewBox="0 0 24 24" fill="none" stroke="#eab308" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="48" height="48" style="margin-bottom: 1rem;">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
        </svg>
        <h3 style="margin: 0 0 0.5rem 0; font-size: 1.1rem; color: var(--text-strong);">Edit Problem</h3>
        <p style="margin: 0; font-size: 0.85rem; color: var(--text-muted);">Modify existing problems</p>
      </a>
    </div>
  </div>
</div>

<style>
  .dashboard-card:hover {
    border-color: var(--primary) !important;
    background: var(--surface-2) !important;
    transform: translateY(-2px);
  }
</style>
