<div class="toast-stack">
    @for (toast of toastService.toasts(); track toast.id) {
    <div class="toast-card" [attr.data-type]="toast.type">
        <span class="toast-card__icon">{{ iconFor(toast.type) }}</span>
        <p class="toast-card__message">{{ toast.message }}</p>
        <button type="button" class="toast-card__close" (click)="toastService.remove(toast.id)">
            Close
        </button>
    </div>
    }
</div>
