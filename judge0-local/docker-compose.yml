version: '3.8'

services:
  server:
    image: judge0/judge0:latest
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    env_file: judge0.conf
    restart: always
    depends_on:
      - db
      - redis

  worker:
    image: judge0/judge0:latest
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    env_file: judge0.conf
    restart: always
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    env_file: judge0.conf
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7
    command: [ "bash", "-c", 'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"' ]
    env_file: judge0.conf
    restart: always

volumes:
  postgres-data:
